version: '3.9'

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - '5672:5672'
      - '15672:15672'
    env_file:
      - .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 200M

  postgres:
    image: postgres:15
    ports:
      - '5432:5432'
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 150M

  # postgres_admin:
  #   image: dpage/pgadmin4
  #   ports:
  #     - '15432:80'
  #   env_file:
  #     - .env
  #   networks:
  #     - backend

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 50M

volumes:
  rabbitmq_data:
  postgres_data:
  redis_data:

networks:
  backend:
    name: backend